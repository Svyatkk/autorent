version: '3.8'

services:
  autorent-db:
    image: mysql:8.0
    container_name: autorent-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: autorent_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      TZ: Europe/Kyiv
    volumes:
      - autorent-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  autorent-phpmyadmin:
    image: phpmyadmin
    container_name: autorent-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: autorent-db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - autorent-db

  autorent-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: autorent-backend
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    environment:
      TZ: Europe/Kyiv
    volumes:
      - ./server:/var/www
    depends_on:
      autorent-db:
        condition: service_healthy

  autorent-nginx:
    image: nginx:alpine
    container_name: autorent-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./server:/var/www
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - autorent-backend

  autorent-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: autorent-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      TZ: Europe/Kyiv
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - autorent-backend

volumes:
  autorent-db-data:
